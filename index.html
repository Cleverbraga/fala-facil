<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpeakUp Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0F2F5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 680px;
      height: 100vh;
      max-height: 800px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      padding: 18px 24px;
      background: #6C5CE7;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 38px;
      height: 38px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-info p {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 1px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #55EFC4;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }

    /* Mensagem individual */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #EDE9FF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .msg-avatar {
      background: #6C5CE7;
      color: white;
      font-size: 13px;
      font-weight: 700;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      color: #141414;
      background: #F0F2F5;
      border-bottom-left-radius: 4px;
    }

    .msg.user .msg-bubble {
      background: #6C5CE7;
      color: white;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: #F0F2F5;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }

    /* Input area */
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid #F0F2F5;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: white;
    }

    #msg-input {
      flex: 1;
      resize: none;
      border: 1.5px solid #E5E5E5;
      border-radius: 12px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
      max-height: 120px;
      transition: border-color 0.15s;
    }

    #msg-input:focus { border-color: #6C5CE7; }
    #msg-input::placeholder { color: #aaa; }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: #6C5CE7;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover   { background: #5A4CD4; }
    #send-btn:active  { transform: scale(0.94); }
    #send-btn:disabled { background: #C5C0F0; cursor: not-allowed; }

    #send-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    /* Mensagem de erro */
    .msg-error .msg-bubble {
      background: #FFF0F0;
      color: #C0392B;
      border: 1px solid #FFCCCC;
    }

    /* Responsivo mobile */
    @media (max-width: 600px) {
      body { background: white; align-items: flex-start; }
      .chat-container { border-radius: 0; height: 100dvh; max-height: none; box-shadow: none; }
    }
  </style>
</head>
<body>

<div class="chat-container" role="main">

  <!-- Header -->
  <header class="chat-header">
    <div class="header-avatar" aria-hidden="true">💬</div>
    <div class="header-info">
      <h1>SpeakUp</h1>
      <p><span class="status-dot" aria-hidden="true"></span>Online</p>
    </div>
  </header>

  <!-- Área de mensagens -->
  <div class="chat-messages" id="chat-messages" role="log" aria-live="polite" aria-label="Conversa">

    <!-- Mensagem inicial do bot -->
    <div class="msg bot">
      <div class="msg-avatar" aria-hidden="true">🤖</div>
      <div class="msg-bubble">Olá! Como posso ajudar você hoje?</div>
    </div>

  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea
      id="msg-input"
      rows="1"
      placeholder="Digite sua mensagem..."
      aria-label="Campo de mensagem"
      maxlength="2000"
    ></textarea>
    <button id="send-btn" aria-label="Enviar mensagem">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>

<script>
  const input    = document.getElementById('msg-input');
  const sendBtn  = document.getElementById('send-btn');
  const messages = document.getElementById('chat-messages');

  /* ── Auto-resize do textarea ── */
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  /* ── Enter envia, Shift+Enter quebra linha ── */
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviar();
    }
  });

  sendBtn.addEventListener('click', enviar);

  /* ── Adiciona uma mensagem na conversa ── */
  function adicionarMensagem(texto, tipo = 'bot') {
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${tipo}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.setAttribute('aria-hidden', 'true');
    avatar.textContent = tipo === 'user' ? 'Eu' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = texto;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);

    if (tipo === 'error') wrapper.classList.add('msg-error');

    messages.appendChild(wrapper);
    rolarParaBaixo();
    return wrapper;
  }

  /* ── Indicador de digitação (três pontinhos) ── */
  function mostrarTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg bot';
    wrapper.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.setAttribute('aria-hidden', 'true');
    avatar.textContent = '🤖';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(typing);
    messages.appendChild(wrapper);
    rolarParaBaixo();
    return wrapper;
  }

  function removerTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function rolarParaBaixo() {
    messages.scrollTop = messages.scrollHeight;
  }

  /* ── Função principal de envio ── */
  async function enviar() {
    const texto = input.value.trim();
    if (!texto) return;

    /* Limpa input e desabilita botão */
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    /* Exibe mensagem do usuário */
    adicionarMensagem(texto, 'user');

    /* Exibe indicador de digitação */
    mostrarTyping();

    try {
      const res = await fetch('/.netlify/functions/speakup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: texto }),
      });

      removerTyping();

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || `Erro ${res.status}`);
      }

      const data = await res.json();

      /* Exibe a resposta do servidor */
      const resposta = data.reply || data.message || data.response || JSON.stringify(data);
      adicionarMensagem(resposta, 'bot');

    } catch (err) {
      removerTyping();
      adicionarMensagem(`Erro: ${err.message}`, 'error');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
